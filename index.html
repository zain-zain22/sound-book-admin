<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📚 വിദ്യാർത്ഥി പാനൽ 🔊</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a252f; color: white; padding: 10px; margin: 0; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: #2c3e50; padding: 15px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        h2 { margin-top: 5px; color: #ecf0f1; font-size: 20px; }
        .student-info { background: #34495e; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 15px; border-left: 5px solid #2ecc71; text-align: left; }
        .search-box { background: #34495e; padding: 12px; border-radius: 6px; margin-bottom: 15px; text-align: left; }
        label { font-size: 13px; color: #bdc3c7; display: block; margin-bottom: 4px; }
        select { width: 100%; padding: 12px; border: none; border-radius: 4px; background: #fff; color: #333; font-size: 15px; margin-bottom: 12px; font-weight: bold; }
        button { background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 15px; }
        .image-wrapper { position: relative; width: 100%; border: 3px solid #7f8c8d; background: #000; margin-top: 10px; border-radius: 4px; overflow: hidden; display: none; }
        .image-wrapper img { width: 100%; display: block; height: auto; }
        .word-touch-zone { position: absolute; border: 2px dashed rgba(46, 204, 113, 0.4); background: rgba(46, 204, 113, 0.15); border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .word-touch-zone:active { background: rgba(231, 76, 60, 0.5); border-color: #e74c3c; }
        .no-data { color: #e74c3c; font-weight: bold; margin-top: 20px; font-size: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>📚 സൗണ്ട് ബുക്ക് - സ്റ്റുഡന്റ് പാനൽ</h2>
        
        <div class="search-box">
            <label>🏫 നിങ്ങളുടെ മദ്രസ തിരഞ്ഞെടുക്കുക:</label>
            <select id="madrasaSelect" onchange="updateStudentDropdown()">
                <option value="">⏳ ലോഡ് ചെയ്യുന്നു...</option>
            </select>
            
            <label>👤 നിങ്ങളുടെ പേര് തിരഞ്ഞെടുക്കുക:</label>
            <select id="studentSelect">
                <option value="">-- മദ്രസ ആദ്യം തിരഞ്ഞെടുക്കുക --</option>
            </select>
            
            <button onclick="loadCommonBook()">📖 പാഠപുസ്തകം തുറക്കുക</button>
        </div>

        <div class="student-info" id="infoBar" style="display:none;">
            👤 <b>വിദ്യാർത്ഥി:</b> <span id="lblStudent" style="color:#2ecc71; font-weight:bold;"></span><br>
            🏫 <b>മദ്രസ:</b> <span id="lblMadrasa" style="font-weight:bold;"></span>
        </div>

        <p id="statusMsg" class="no-data"></p>

        <div class="image-wrapper" id="bookWrapper">
            <img id="pageImage" src="" alt="Book Page">
            <div id="zonesContainer"></div>
        </div>
    </div>

    <script>
        let currentAudio = null;
        let masterSchoolData = {};

        // 📥 മാസ്റ്റർ ലിസ്റ്റ് എടുക്കുന്നു
        async function fetchMasterList() {
            const mSelect = document.getElementById('madrasaSelect');
            try {
                let response = await fetch('data/master_list.json');
                if(!response.ok) throw new Error("ലിസ്റ്റ് ലഭ്യമല്ല");
                masterSchoolData = await response.json();
                
                mSelect.innerHTML = '<option value="">-- മദ്രസ സെലക്ട് ചെയ്യുക --</option>';
                Object.keys(masterSchoolData).sort().forEach(madrasa => {
                    let opt = document.createElement('option'); opt.value = madrasa; opt.innerText = madrasa;
                    mSelect.appendChild(opt);
                });
                document.getElementById('statusMsg').innerText = "";
            } catch (error) {
                mSelect.innerHTML = '<option value="">❌ ഡാറ്റ ലഭ്യമല്ല</option>';
                document.getElementById('statusMsg').innerText = "⚠️ പുതിയ ലിസ്റ്റുകൾ ഒന്നും അപ്‌ലോഡ് ചെയ്തിട്ടില്ല!";
            }
        }

        // 🏫 മദ്രസ മാറുമ്പോൾ അതിലെ കുട്ടികളെ മാത്രം ഡ്രോപ്പ്ഡൗണിൽ കാണിക്കുന്നു
        function updateStudentDropdown() {
            const mSelect = document.getElementById('madrasaSelect').value;
            const sSelect = document.getElementById('studentSelect');
            sSelect.innerHTML = '<option value="">-- നിങ്ങളുടെ പേര് തിരഞ്ഞെടുക്കുക --</option>';
            
            if (mSelect && masterSchoolData[mSelect]) {
                masterSchoolData[mSelect].sort().forEach(student => {
                    let opt = document.createElement('option'); opt.value = student; opt.innerText = student;
                    sSelect.appendChild(opt);
                });
            }
        }

        // 📖 കുട്ടിയുടെ പേര് സെലക്ട് ചെയ്യുമ്പോൾ കോമൺ ആയ ഒരൊറ്റ പാഠം ലോഡ് ചെയ്യുന്നു!
        async function loadCommonBook() {
            let madrasa = document.getElementById('madrasaSelect').value;
            let student = document.getElementById('studentSelect').value;
            
            if(!madrasa || !student) return alert("ദയവായി മദ്രസയും നിങ്ങളുടെ പേരും സെലക്ട് ചെയ്യുക!");

            let statusMsg = document.getElementById('statusMsg');
            let bookWrapper = document.getElementById('bookWrapper');
            let infoBar = document.getElementById('infoBar');
            let zonesContainer = document.getElementById('zonesContainer');
            
            statusMsg.innerText = "⏳ പാഠപുസ്തകം ലോഡ് ചെയ്യുന്നു...";
            bookWrapper.style.display = 'none'; infoBar.style.display = 'none'; zonesContainer.innerHTML = '';

            // 🎯 പെർഫെക്റ്റ് ലോജിക്: പാഠം കിടക്കുന്നത് നേരിട്ട് ഡാറ്റാ ഫോൾഡറിലെ കോമൺ ഫയലിലാണ്!
            let jsonUrl = `data/data_book.json`;

            try {
                let response = await fetch(jsonUrl);
                if(!response.ok) throw new Error("പാഠം ലഭ്യമല്ല");
                let pageData = await response.json();
                
                document.getElementById('lblStudent').innerText = student;
                document.getElementById('lblMadrasa').innerText = madrasa;
                infoBar.style.display = 'block';
                
                document.getElementById('pageImage').src = pageData.image;
                bookWrapper.style.display = 'block'; statusMsg.innerText = "";

                pageData.zones.forEach(zone => {
                    let box = document.createElement('div');
                    box.className = 'word-touch-zone';
                    box.style.left = zone.coords.left + '%'; box.style.top = zone.coords.top + '%';
                    box.style.width = zone.coords.width + '%'; box.style.height = zone.coords.height + '%';
                    
                    box.onclick = function() {
                        if(currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
                        currentAudio = new Audio(zone.audioSrc);
                        currentAudio.play().catch(e => console.log("Error:", e));
                    };
                    zonesContainer.appendChild(box);
                });
            } catch (error) {
                statusMsg.innerText = `❌ നിലവിൽ പാഠങ്ങൾ ഒന്നും സെറ്റ് ചെയ്തിട്ടില്ല!`;
            }
        }

        fetchMasterList();
    </script>
</body>
</html>
