<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>സൗണ്ട് ബുക്ക് - കുട്ടികളുടെ പാനല്‍</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 0; user-select: none; }
        .screen { display: none; width: 100%; min-height: 100vh; padding: 15px; position: relative; }
        .active-screen { display: flex; flex-direction: column; align-items: center; }
        
        /* മെനു സ്റ്റൈലുകൾ */
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 5px; text-align: center; }
        h3 { color: #7f8c8d; margin-top: 0; font-size: 16px; }
        .menu-box { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; margin-top: 15px; }
        select { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 2px solid #bdc3c7; margin-bottom: 15px; background: #fff; }
        
        button { background: #3498db; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 8px 0; box-shadow: 0 3px 6px rgba(0,0,0,0.1); transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-green { background: #2ecc71; }
        .btn-purple { background: #9b59b6; }
        .btn-lock { background: #95a5a6 !important; opacity: 0.7; cursor: not-allowed; }
        
        /* ബുക്ക് റീഡിങ് സ്റ്റൈലുകൾ */
        .book-container { position: relative; width: 100%; max-width: 600px; background: #000; border: 3px solid #2c3e50; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .book-container img { width: 100%; height: auto; display: block; }
        
        /* ലൈവ് ആനിമേഷൻ പ്ലേ ചെയ്യുന്ന SVG ലെയർ */
        #playbackEngine { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* കൺട്രോൾ ബട്ടണുകൾ */
        .controls-bar { width: 100%; max-width: 600px; display: flex; gap: 10px; margin-top: 10px; }
        .btn-half { flex: 1; padding: 12px; font-size: 15px; }
        
        /* ലോഡിംഗ് ലെയർ */
        .loading-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; font-size: 18px; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

    <div id="loadingLayer" class="loading-layer">
        <span>🔄 പാഠപുസ്തകം ലോഡ് ചെയ്യുന്നു...</span>
    </div>

    <div id="loginScreen" class="screen active-screen">
        <div class="menu-box" style="border-top: 5px solid #3498db;">
            <h1>📖 ഡിജിറ്റൽ സൗണ്ട് ബുക്ക്</h1>
            <h3>വിദ്യാർത്ഥികളുടെ പാനൽ</h3>
            <hr style="border: 1px dashed #eee; margin: 15px 0;">
            
            <label style="display:block; text-align:left; font-weight:bold; margin-bottom:5px; color:#34495e;">🏫 മദ്രസ തിരഞ്ഞെടുക്കുക:</label>
            <select id="madrasaSelect" onchange="onMadrasaChanged()"></select>
            
            <label style="display:block; text-align:left; font-weight:bold; margin-bottom:5px; color:#34495e;">👤 കുട്ടിയുടെ പേര്:</label>
            <select id="studentSelect" onchange="onStudentChanged()"></select>
            
            <button class="btn-green" onclick="enterToMainMenu()">തുടങ്ങുക 🚀</button>
        </div>
    </div>

    <div id="mainMenuScreen" class="screen">
        <div class="menu-box" style="border-top: 5px solid #2ecc71; max-width: 450px;">
            <h2 id="welcomeText" style="color:#2c3e50; margin-top:0;">ഹലോ</h2>
            <p style="color:#7f8c8d; font-size:14px;">ഇന്നത്തെ പാഠങ്ങൾ പഠിക്കാൻ താഴെയുള്ള ബട്ടണുകൾ ഉപയോഗിക്കുക.</p>
            <hr style="border: 1px dashed #eee; margin: 15px 0;">
            
            <button id="btnMenuRevision" class="btn-purple" onclick="startRevisionMode()">📖 ഇന്നത്തെ റിവിഷൻ പ്ലേ ചെയ്യുക</button>
            
            <button id="btnMenuQuiz" class="btn-lock" onclick="startQuizMode()" disabled>🎮 ക്വിസ്സ് ഗെയിം (Lock 🔒)</button>
            
            <button style="background:#7f8c8d; margin-top:20px; font-size:14px; padding:10px;" onclick="showScreen('loginScreen')">🔙 പ്രൊഫൈൽ മാറ്റുക</button>
        </div>
    </div>

    <div id="revisionScreen" class="screen">
        <h2 style="margin: 5px 0; color:#2c3e50;">📖 റീഡിങ് ടൈം</h2>
        <div style="font-size:13px; color:#7f8c8d; margin-bottom:5px;" id="revisionProgressText">പേജ്: 0 / 0</div>
        
        <div class="book-container" id="bookContainer">
            <img id="revisionBookImg" src="" alt="Book Page">
            <svg id="playbackEngine" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="none"></svg>
        </div>
        
        <div class="controls-bar">
            <button id="nextWordBtn" class="btn-green" onclick="stepToNextWord()">അടുത്ത വാക്ക് ➡️</button>
        </div>
        <div class="controls-bar">
            <button class="btn-half" style="background:#7f8c8d;" onclick="quitRevision()">❌ നിർത്തുക</button>
        </div>
    </div>

    <audio id="audioPlayer" style="display:none;"></audio>

    <script>
        let bookData = { pages: [] };
        let masterList = {};
        let currentStudent = "";
        let currentMadrasa = "";
        
        // റിവിഷൻ കൺട്രോൾ വേരിയബിളുകൾ
        let revisionPagesList = []; 
        let currentRevIdx = 0;       
        let currentZoneIdx = -1;     
        let isWordAudioFinished = true;

        window.onload = function() {
            window.location.hash = "main";
            loadDataFromBackend();
        };

        // ഗിറ്റ്ഹബ്ബിൽ നിന്ന് ഡാറ്റകൾ ലോഡ് ചെയ്യുന്നു
        async function loadDataFromBackend() {
            try {
                let r1 = await fetch('data/master_list.json?t=' + Date.now());
                if(r1.ok) masterList = await r1.json();
                
                let r2 = await fetch('data/data_book.json?t=' + Date.now());
                if(r2.ok) bookData = await r2.json();
                
                initProfileSelectors();
            } catch(e) {
                alert("ഡാറ്റ ലോഡ് ചെയ്യുന്നതിൽ പരാജയപ്പെട്ടു. ഇന്റർനെറ്റ് പരിശോധിക്കുക!");
            }
            document.getElementById('loadingLayer').style.display = 'none';
        }

        function initProfileSelectors() {
            let mSel = document.getElementById('madrasaSelect');
            mSel.innerHTML = "";
            Object.keys(masterList).sort().forEach(m => {
                let opt = document.createElement('option');
                opt.value = m; opt.innerText = m; mSel.appendChild(opt);
            });
            onMadrasaChanged();
        }

        function onMadrasaChanged() {
            let m = document.getElementById('madrasaSelect').value;
            let sSel = document.getElementById('studentSelect');
            sSel.innerHTML = "";
            if(!m || !masterList[m]) return;
            masterList[m].sort().forEach(s => {
                let opt = document.createElement('option');
                opt.value = s; opt.innerText = s; sSel.appendChild(opt);
            });
        }

        function onStudentChanged() { /* ആവശ്യമുണ്ടെങ്കിൽ ഉപയോഗിക്കാം */ }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function enterToMainMenu() {
            currentMadrasa = document.getElementById('madrasaSelect').value;
            currentStudent = document.getElementById('studentSelect').value;
            if(!currentMadrasa || !currentStudent) return alert("വിവരങ്ങൾ തിരഞ്ഞെടുക്കുക!");
            
            document.getElementById('welcomeText').innerText = `👤 ${currentStudent}`;
            updateMenuButtons();
            showScreen('mainMenuScreen');
        }

        // ലോക്ക് സിസ്റ്റം കീ
        function getTodayLockKey(studentName) {
            let today = new Date().toISOString().split('T')[0];
            return `lock_${studentName}_${today}`;
        }

        function updateMenuButtons() {
            let isUnlocked = localStorage.getItem(getTodayLockKey(currentStudent));
            let quizBtn = document.getElementById('btnMenuQuiz');
            if(isUnlocked === "true") {
                quizBtn.disabled = false;
                quizBtn.className = "btn-green";
                quizBtn.innerText = "🎮 ക്വിസ്സ് ഗെയിം കളിക്കുക 🚀";
            } else {
                quizBtn.disabled = true;
                quizBtn.className = "btn-lock";
                quizBtn.innerText = "🎮 ക്വിസ്സ് ഗെയിം (Lock 🔒)";
            }
        }

        // ==========================================
        // 📖 റിവിഷൻ മോഡ് (MAIN ENGINE)
        // ==========================================
        function startRevisionMode() {
            // ഹൈഡ് ചെയ്യാത്ത (Visible) പേജുകൾ മാത്രം ഫിൽട്ടർ ചെയ്ത് എടുക്കുന്നു
            revisionPagesList = bookData.pages.filter(p => !p.hidden);
            if(revisionPagesList.length === 0) {
                return alert("പാഠപുസ്തകത്തിൽ പേജുകൾ ഒന്നും ലഭ്യമല്ല!");
            }
            currentRevIdx = 0;
            loadRevisionPage();
            showScreen('revisionScreen');
        }

        function loadRevisionPage() {
            let page = revisionPagesList[currentRevIdx];
            document.getElementById('revisionProgressText').innerText = `പേജ്: ${currentRevIdx + 1} / ${revisionPagesList.length}`;
            
            let img = document.getElementById('revisionBookImg');
            img.src = page.image + "?t=" + Date.now();
            
            // പേജ് മാറുമ്പോൾ ഇൻഡെക്സ് ആദ്യ വാക്കിന് തൊട്ട് മുൻപിലേക്ക് സെറ്റ് ചെയ്യുന്നു
            currentZoneIdx = -1; 
            isWordAudioFinished = true;
            
            // പഴയ വരകൾ മായ്ക്കുന്നു
            document.getElementById('playbackEngine').innerHTML = "";
            disableNextWordButton(false);
        }

        function disableNextWordButton(status) {
            let btn = document.getElementById('nextWordBtn');
            if(!btn) return;
            if(status) {
                btn.disabled = true;
                btn.classList.add('btn-lock');
                btn.innerText = "⏳ ഓഡിയോ പ്ലേ ചെയ്യുന്നു...";
            } else {
                btn.disabled = false;
                btn.classList.remove('btn-lock');
                btn.innerText = "അടുത്ത വാക്ക് ➡️";
            }
        }

        // 🎯 കുട്ടി 'Next' ബട്ടൺ അമർത്തുമ്പോൾ മാത്രം അടുത്ത വാക്കിലേക്ക് പോകുന്നു
        function stepToNextWord() {
            if(!isWordAudioFinished) return; // ഓഡിയോ തീരും മുൻപ് വീണ്ടും ഞെക്കിയാൽ വർക്ക് ആകില്ല
            
            let page = revisionPagesList[currentRevIdx];
            currentZoneIdx++;
            
            // ഈ പേജിലെ വാക്കുകൾ കഴിഞ്ഞാൽ അടുത്ത പേജിലേക്ക് പോകുന്നു
            if(currentZoneIdx >= page.zones.length) {
                stepToNextPage();
                return;
            }
            
            let zone = page.zones[currentZoneIdx];
            
            // ഓഡിയോ പ്ലേ ചെയ്യുന്നു
            isWordAudioFinished = false;
            disableNextWordButton(true);
            
            let player = document.getElementById('audioPlayer');
            player.src = zone.audioSrc + "?t=" + Date.now();
            player.play().catch(() => {
                // ഓഡിയോ ലോഡ് ആയില്ലെങ്കിൽ ലോക്ക് റിലീസ് ചെയ്യും
                isWordAudioFinished = true;
                disableNextWordButton(false);
            });
            
            // ✍️ ലൈവ് വര വരയ്ക്കുന്ന ആനിമേഷൻ റൺ ചെയ്യുന്നു
            if(page.readingPaths && page.readingPaths[currentZoneIdx]) {
                animateReadingPath(page.readingPaths[currentZoneIdx]);
            }
        }

        // ഓഡിയോ തീർന്നു എന്ന് ഉറപ്പാക്കുന്ന ലിസണർ
        document.getElementById('audioPlayer').addEventListener('ended', () => {
            isWordAudioFinished = true;
            disableNextWordButton(false);
        });

        // ലൈവ് വര വരയ്ക്കുന്ന ഫങ്ക്ഷൻ (with hand.png ആനിമേഷൻ)
        function animateReadingPath(pathPoints) {
            if(!pathPoints || pathPoints.length === 0) return;
            let svg = document.getElementById('playbackEngine');
            
            // ഒന്നിലധികം ലെയറുകൾ ഉള്ള മനോഹരമായ കാലിഗ്രാഫി വര നിർമ്മിക്കുന്നു
            let g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            let paths = [];
            for(let i=0; i<12; i++) {
                let p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                p.setAttribute("transform", `translate(${(i-6)*0.3}, ${-(i-6)})`);
                p.setAttribute("stroke", "#2980b9"); // നീല വര
                p.setAttribute("stroke-width", "2");
                p.setAttribute("fill", "none");
                p.setAttribute("stroke-linecap", "round");
                p.setAttribute("d", `M ${pathPoints[0].x} ${pathPoints[0].y}`);
                g.appendChild(p);
                paths.push(p);
            }
            svg.appendChild(g);

            // കൈയുടെ ചിത്രം (hand.png) ലെയറിലേക്ക് ചേർക്കുന്നു
            let handImg = document.createElementNS("http://www.w3.org/2000/svg", "image");
            handImg.setAttributeNS("http://www.w3.org/1999/xlink", "href", "assets/hand.png");
            handImg.setAttribute("width", "140");
            handImg.setAttribute("height", "140");
            handImg.setAttribute("x", pathPoints[0].x - 15);
            handImg.setAttribute("y", pathPoints[0].y - 5);
            svg.appendChild(handImg);

            let ptIdx = 1;
            let speed = Math.max(5, Math.min(25, Math.floor(1500 / pathPoints.length)));

            let interval = setInterval(() => {
                if(ptIdx >= pathPoints.length) {
                    clearInterval(interval);
                    // വര കഴിഞ്ഞാൽ കൈ അപ്രത്യക്ഷമാകും
                    if(handImg && handImg.parentNode) handImg.parentNode.removeChild(handImg);
                    return;
                }
                let currPt = pathPoints[ptIdx];
                let dString = ` L ${currPt.x} ${currPt.y}`;
                
                paths.forEach(p => p.setAttribute("d", p.getAttribute("d") + dString));
                handImg.setAttribute("x", currPt.x - 15);
                handImg.setAttribute("y", currPt.y - 5);
                
                ptIdx++;
            }, speed);
        }

        function stepToNextPage() {
            if(currentRevIdx < revisionPagesList.length - 1) {
                currentRevIdx++;
                alert("🎯 ഈ പേജ് കഴിഞ്ഞു! അടുത്ത പേജിലേക്ക് പോകാം.");
                loadRevisionPage();
            } else {
                // എല്ലാ പേജും കണ്ട് കഴിഞ്ഞാൽ ക്വിസ്സ് അൺലോക്ക് ആകും
                localStorage.setItem(getTodayLockKey(currentStudent), "true");
                updateMenuButtons();
                alert("🎉 വലിയൊരു കൈയടി! ഇന്നത്തെ റീഡിങ് റിവിഷൻ നീ വിജയകരമായി പൂർത്തിയാക്കി. ഇനി നിനക്ക് ക്വിസ്സ് ഗെയിം കളിക്കാം 🎮");
                showScreen('mainMenuScreen');
            }
        }

        function quitRevision() {
            document.getElementById('audioPlayer').pause();
            showScreen('mainMenuScreen');
        }

        function startQuizMode() {
            alert("🎮 ക്വിസ്സ് ഗെയിം ഇവിടെ പഴയ കോഡ് പ്രകാരം ലോഡ് ചെയ്യാം.");
        }
    </script>
</body>
</html>
