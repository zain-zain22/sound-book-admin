<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>സൗണ്ട് ബുക്ക് - കുട്ടികളുടെ പാനല്‍</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 0; user-select: none; }
        .screen { display: none; width: 100%; min-height: 100vh; padding: 15px; position: relative; }
        .active-screen { display: flex; flex-direction: column; align-items: center; }
        
        /* മെനു സ്റ്റൈലുകൾ */
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 5px; text-align: center; }
        h3 { color: #7f8c8d; margin-top: 0; font-size: 16px; }
        .menu-box { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; margin-top: 15px; }
        select { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 2px solid #bdc3c7; margin-bottom: 15px; background: #fff; }
        
        button { background: #3498db; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 8px 0; box-shadow: 0 3px 6px rgba(0,0,0,0.1); transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-green { background: #2ecc71; }
        .btn-purple { background: #9b59b6; }
        
        /* ആനിമേഷൻ SVG ലെയർ */
        #quizWriteEngine { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .controls-bar { width: 100%; max-width: 600px; display: flex; gap: 10px; margin-top: 10px; }
        
        /* 🎮 ക്വിസ്സ് ഗെയിം സ്റ്റൈലുകൾ */
        .quiz-box { background: white; width: 100%; max-width: 500px; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin-top: 10px; }
        .quiz-canvas-area { position: relative; width: 100%; height: 260px; background: #fff; border: 3px solid #9b59b6; border-radius: 8px; margin-bottom: 15px; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
        .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 10px; }
        .quiz-opt-btn { background: #f39c12; color: white; padding: 18px; font-size: 22px; font-family: 'Traditional Arabic', Arial; direction: rtl; border-radius: 8px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .quiz-opt-btn:active { background: #d35400; }
        .zones-disabled { pointer-events: none; opacity: 0.6; }
        
        /* ലോഡിംഗ് ലെയർ */
        .loading-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; font-size: 18px; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

    <div id="loadingLayer" class="loading-layer">
        <span>🔄 പാഠപുസ്തക വിവരങ്ങൾ ശേഖരിക്കുന്നു...</span>
    </div>

    <div id="loginScreen" class="screen active-screen">
        <div class="menu-box" style="border-top: 5px solid #3498db;">
            <h1>📖 ഡിജിറ്റൽ സൗണ്ട് ബുക്ക്</h1>
            <h3>വിദ്യാർത്ഥികളുടെ പാനൽ</h3>
            <hr style="border: 1px dashed #eee; margin: 15px 0;">
            
            <label style="display:block; text-align:left; font-weight:bold; margin-bottom:5px; color:#34495e;">🏫 മദ്രസ തിരഞ്ഞെടുക്കുക:</label>
            <select id="madrasaSelect" onchange="onMadrasaChanged()"></select>
            
            <label style="display:block; text-align:left; font-weight:bold; margin-bottom:5px; color:#34495e;">👤 കുട്ടിയുടെ പേര്:</label>
            <select id="studentSelect"></select>
            
            <button class="btn-green" onclick="enterToMainMenu()">തുടങ്ങുക 🚀</button>
        </div>
    </div>

    <div id="mainMenuScreen" class="screen">
        <div class="menu-box" style="border-top: 5px solid #2ecc71; max-width: 450px;">
            <h2 id="welcomeText" style="color:#2c3e50; margin-top:0;">ഹലോ</h2>
            <p style="color:#7f8c8d; font-size:14px;">ക്വിസ്സ് ഗെയിം കളിക്കാൻ താഴെയുള്ള ബട്ടൺ അമർത്തുക.</p>
            <hr style="border: 1px dashed #eee; margin: 15px 0;">
            
            <button class="btn-green" onclick="startQuizMode()">🎮 ക്വിസ്സ് ഗെയിം കളിക്കുക 🚀</button>
            
            <button style="background:#7f8c8d; margin-top:20px; font-size:14px; padding:10px;" onclick="showScreen('loginScreen')">🔙 പ്രൊഫൈൽ മാറ്റുക</button>
        </div>
    </div>

    <div id="quizScreen" class="screen">
        <h2 style="margin:5px 0; color:#e67e22;">🎮 കേട്ട് കണ്ടെത്തുക ക്വിസ്സ്</h2>
        <div id="quizProgressText" style="font-size:13px; color:#7f8c8d; margin-bottom:5px;">ചോദ്യം: 0 / 0</div>
        
        <div class="quiz-box">
            <div class="quiz-canvas-area">
                <div style="position:absolute; top:40%; left:0; width:100%; text-align:center; color:#bdc3c7; font-size:14px; font-weight:bold;" id="quizCanvasPlaceholder">ഉത്തരം ശരിയായാൽ ഇവിടെ എഴുതി കാണിക്കും!</div>
                <svg id="quizWriteEngine" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="none"></svg>
            </div>

            <button class="btn-purple" style="padding:12px; font-size:15px; margin-bottom:10px;" onclick="replayQuizAudio()">🔊 ശബ്ദം വീണ്ടും കേൾക്കുക</button>
            
            <div class="quiz-options" id="quizOptionsContainer"></div>
        </div>

        <div class="controls-bar" style="max-width:500px;">
            <button style="background:#7f8c8d; padding:10px; font-size:14px;" onclick="quitQuiz()">❌ ക്വിസ്സ് നിർത്തുക</button>
        </div>
    </div>

    <audio id="audioPlayer" style="display:none;"></audio>

    <script>
        let bookData = { pages: [] };
        let masterList = {};
        let currentStudent = "";
        let currentMadrasa = "";
        
        let quizPool = [];
        let currentQuizIdx = 0;
        let correctQuizZone = null;

        window.onload = function() {
            loadDataFromBackend();
        };

        async function loadDataFromBackend() {
            let cacheBuster = Date.now(); 
            try {
                let r1 = await fetch(`./data/master_list.json?t=${cacheBuster}`);
                if(r1.ok) {
                    masterList = await r1.json();
                }
                
                let r2 = await fetch(`./data/data_book.json?t=${cacheBuster}`);
                if(r2.ok) {
                    bookData = await r2.json();
                }
                
                initProfileSelectors();
            } catch(e) {
                console.error("Error loading JSON:", e);
            } finally {
                document.getElementById('loadingLayer').style.display = 'none';
            }
        }

        function initProfileSelectors() {
            let mSel = document.getElementById('madrasaSelect');
            mSel.innerHTML = "";
            
            if (Object.keys(masterList).length === 0) {
                let opt = document.createElement('option');
                opt.innerText = "ഡാറ്റ ലഭ്യമല്ല";
                mSel.appendChild(opt);
                return;
            }

            Object.keys(masterList).sort().forEach(m => {
                let opt = document.createElement('option');
                opt.value = m; opt.innerText = m; mSel.appendChild(opt);
            });
            onMadrasaChanged();
        }

        function onMadrasaChanged() {
            let m = document.getElementById('madrasaSelect').value;
            let sSel = document.getElementById('studentSelect');
            sSel.innerHTML = "";
            if(!m || !masterList[m]) return;
            masterList[m].sort().forEach(s => {
                let opt = document.createElement('option');
                opt.value = s; opt.innerText = s; sSel.appendChild(opt);
            });
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function enterToMainMenu() {
            currentMadrasa = document.getElementById('madrasaSelect').value;
            currentStudent = document.getElementById('studentSelect').value;
            if(!currentMadrasa || !currentStudent || currentMadrasa === "ഡാറ്റ ലഭ്യമല്ല") return alert("വിവരങ്ങൾ തിരഞ്ഞെടുക്കുക!");
            
            document.getElementById('welcomeText').innerText = `👤 ${currentStudent}`;
            showScreen('mainMenuScreen');
        }

        function startQuizMode() {
            try {
                quizPool = [];
                let visiblePages = bookData.pages ? bookData.pages.filter(p => p && !p.hidden) : [];
                
                visiblePages.forEach(page => {
                    if(page && page.zones && Array.isArray(page.zones)) {
                        page.zones.forEach(zone => {
                            if (!zone) return;
                            
                            let rawText = zone.text ? String(zone.text).trim() : "";
                            let rawAudio = zone.audioSrc ? String(zone.audioSrc).trim() : "";
                            
                            // 🔒 ടെക്സ്റ്റും വോയ്സും ഒരേപോലെ ഉണ്ടെങ്കിൽ മാത്രം ക്വിസ്സിലേക്ക് എടുക്കുന്നു
                            if(rawText !== "" && rawAudio !== "") {
                                if (!rawAudio.startsWith('data/') && !rawAudio.startsWith('http')) {
                                    rawAudio = 'data/' + rawAudio;
                                }
                                zone.audioSrc = rawAudio; 
                                quizPool.push({ zone: zone, allPages: visiblePages });
                            }
                        });
                    }
                });

                if(quizPool.length === 0) {
                    return alert("⚠️ ക്വിസ്സ് നടത്താൻ ആവശ്യമായ അറബിക് വാക്കുകൾ (ടെക്സ്റ്റും വോയ്സും ഉള്ളവ) ലഭ്യമല്ല!");
                }

                quizPool.sort(() => Math.random() - 0.5);
                currentQuizIdx = 0;
                showScreen('quizScreen');
                loadQuizQuestion();
            } catch (error) {
                alert("ക്വിസ്സ് ലോഡ് ചെയ്യുന്നതിൽ ഒരു തകരാർ: " + error.message);
            }
        }

        function loadQuizQuestion() {
            document.getElementById('quizWriteEngine').innerHTML = "";
            document.getElementById('quizCanvasPlaceholder').style.display = "block";
            document.getElementById('quizOptionsContainer').classList.remove('zones-disabled');
            
            let currentQuiz = quizPool[currentQuizIdx];
            correctQuizZone = currentQuiz.zone;
            
            document.getElementById('quizProgressText').innerText = `ചോദ്യം: ${currentQuizIdx + 1} / ${quizPool.length}`;
            
            replayQuizAudio();

            let optionsText = [correctQuizZone.text.trim()];
            let allTextWords = [];
            
            currentQuiz.allPages.forEach(p => {
                if(p && p.zones) p.zones.forEach(z => {
                    if(z && z.text && String(z.text).trim() !== "") allTextWords.push(String(z.text).trim());
                });
            });
            
            allTextWords = [...new Set(allTextWords)].filter(w => w !== correctQuizZone.text.trim());
            allTextWords.sort(() => Math.random() - 0.5);
            
            for(let i=0; i<3; i++) {
                if(allTextWords[i]) optionsText.push(allTextWords[i]);
            }
            
            optionsText.sort(() => Math.random() - 0.5);
            
            let container = document.getElementById('quizOptionsContainer');
            container.innerHTML = "";
            optionsText.forEach(txt => {
                let btn = document.createElement('button');
                btn.className = "quiz-opt-btn";
                btn.innerText = txt;
                btn.onclick = () => checkQuizAnswer(txt, btn);
                container.appendChild(btn);
            });
        }

        function replayQuizAudio() {
            if(!correctQuizZone) return;
            let player = document.getElementById('audioPlayer');
            player.src = correctQuizZone.audioSrc + "?t=" + Date.now();
            player.play();
        }

        function checkQuizAnswer(selectedText, btnElement) {
            document.getElementById('quizOptionsContainer').classList.add('zones-disabled');
            
            if(selectedText === correctQuizZone.text.trim()) {
                btnElement.style.background = "#2ecc71";
                document.getElementById('quizCanvasPlaceholder').style.display = "none";
                
                if(correctQuizZone.writingPaths) {
                    animateQuizHandwriting(correctQuizZone.writingPaths);
                }
                
                setTimeout(() => {
                    currentQuizIdx++;
                    if(currentQuizIdx < quizPool.length) {
                        loadQuizQuestion();
                    } else {
                        alert("🎉 അഭിനന്ദനങ്ങൾ! നീ എല്ലാ ചോദ്യങ്ങൾക്കും കൃത്യമായി ഉത്തരം നൽകി ക്വിസ്സ് ഗെയിം ജയിച്ചിരിക്കുന്നു! 🏆");
                        showScreen('mainMenuScreen');
                    }
                }, 2500);
            } else {
                btnElement.style.background = "#e74c3c";
                alert("❌ ഉത്തരം തെറ്റാണ്, വിഷമിക്കേണ്ട ശബ്ദം വീണ്ടും കേട്ട് ഒന്നുകൂടി നോക്കൂ!");
                document.getElementById('quizOptionsContainer').classList.remove('zones-disabled');
                btnElement.style.background = "#f39c12"; 
            }
        }

        function animateQuizHandwriting(pathsData) {
            let svg = document.getElementById('quizWriteEngine');
            svg.innerHTML = "";
            
            pathsData.forEach(pathPoints => {
                let g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                let paths = [];
                for(let i=0; i<16; i++) {
                    let p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    p.setAttribute("transform", `translate(${(i-8)*0.4}, ${-(i-8)})`);
                    p.setAttribute("stroke", "#e74c3c"); 
                    p.setAttribute("stroke-width", "2");
                    p.setAttribute("fill", "none");
                    p.setAttribute("stroke-linecap", "round");
                    p.setAttribute("d", `M ${pathPoints[0].x} ${pathPoints[0].y}`);
                    g.appendChild(p);
                    paths.push(p);
                }
                svg.appendChild(g);

                let ptIdx = 1;
                let speed = Math.max(5, Math.min(25, Math.floor(1000 / pathPoints.length)));
                let interval = setInterval(() => {
                    if(ptIdx >= pathPoints.length) {
                        clearInterval(interval);
                        return;
                    }
                    let currPt = pathPoints[ptIdx];
                    let dString = ` L ${currPt.x} ${currPt.y}`;
                    paths.forEach(p => p.setAttribute("d", p.getAttribute("d") + dString));
                    ptIdx++;
                }, speed);
            });
        }

        function quitQuiz() {
            document.getElementById('audioPlayer').pause();
            showScreen('mainMenuScreen');
        }
    </script>
</body>
</html>
