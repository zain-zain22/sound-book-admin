<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>സൗണ്ട് ബുക്ക് - ഗിറ്റ്ഹബ്ബ് സിങ്ക് അഡ്മിൻ</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; background: #eef2f3; text-align: center; margin: 0; }
        .admin-box { background: white; max-width: 500px; margin: 10px auto; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: left; }
        h2, h4 { text-align: center; color: #2c3e50; margin-top: 5px; }
        .section { background: #f9f9f9; padding: 12px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #ddd; }
        input[type="text"], select, input[type="file"] { width: 100%; padding: 10px; margin: 5px 0 10px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .image-container { position: relative; display: inline-block; border: 2px solid #34495e; width: 100%; background: #000; margin-top: 5px; }
        .image-container img { display: block; width: 100%; height: auto; }
        .selection-box { position: absolute; border: 2px dashed #e74c3c; background: rgba(231, 76, 60, 0.3); display: none; pointer-events: none; }
        .controls input[type="range"] { width: 100%; }
        button { color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; margin: 5px 0; font-weight: bold; width: 100%; font-size: 15px; }
        .btn-blue { background: #3498db; }
        .btn-green { background: #2ecc71; }
        .btn-record { background: #e74c3c; }
        .btn-stop { background: #2c3e50; display: none; }
        .status-text { font-weight: bold; color: #e74c3c; text-align: center; margin: 5px 0; }
        #audioPlayback { margin-top: 5px; display: none; width: 100%; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); color: white; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; z-index: 9999; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay" style="flex-direction: column;">
        <span id="loadText">📦 GitHub-ൽ നിന്ന് പഴയ ഡാറ്റകൾ ശേഖരിക്കുന്നു...</span>
    </div>

    <div class="admin-box">
        <h2>🏫 മദ്രസ & വിദ്യാർത്ഥി മാനേജ്‌മെന്റ്</h2>
        <p id="syncStatus" style="color: #27ae60; font-weight: bold; text-align: center; margin: 0; font-size: 13px;">🔄 GitHub-മായി ലിങ്ക് ചെയ്തിരിക്കുന്നു</p>
        
        <div class="section">
            <h4>1. പുതിയ മദ്രസ ചേർക്കുക:</h4>
            <input type="text" id="madrasaName" placeholder="മദ്രസയുടെ പേര് ഇംഗ്ലീഷിൽ (ഉദാ: Busthan)">
            <button class="btn-blue" onclick="addMadrasaData()">➕ മദ്രസ ലിസ്റ്റിലേക്ക് ചേർക്കുക</button>
        </div>

        <div class="section">
            <h4>2. മദ്രസയിലേക്ക് കുട്ടികളെ ചേർക്കുക:</h4>
            <label>മദ്രസ തിരഞ്ഞെടുക്കുക:</label>
            <select id="madrasaSelect" onchange="updateStudentDropdown()"></select>
            
            <input type="text" id="studentName" placeholder="കുട്ടിയുടെ പേര് ഇംഗ്ലീഷിൽ (ഉദാ: Zain)">
            <button class="btn-green" onclick="addStudentData()">➕ കുട്ടിയെ ലിസ്റ്റിലേക്ക് ചേർക്കുക</button>
        </div>

        <div class="section" style="background: #eef2f3; border: 2px solid #3498db;">
            <label style="font-weight: bold; color: #2c3e50;">🎯 പാഠം തയ്യാറാക്കേണ്ട വിദ്യാർത്ഥി:</label>
            <select id="finalStudentSelect" style="font-weight: bold; color: #2c3e50;"></select>
        </div>
    </div>

    <div class="admin-box">
        <h2>📖 പാഠഭാഗങ്ങൾ സെറ്റ് ചെയ്യുക</h2>
        <input type="file" id="imageUploader" accept="image/*">
        
        <div id="mappingSection" style="display:none;">
            <p style="color: #2c3e50; font-weight: bold; text-align:center;">📱 ചിത്രത്തിൽ വാക്കിന് മുകളിൽ തൊടുക:</p>
            <div class="image-container" id="imageContainer" onclick="selectWordLocation(event)">
                <img id="bookImg" src="" alt="Book Page">
                <div class="selection-box" id="selectionBox"></div>
            </div>
            
            <div class="controls section" style="margin-top:10px;">
                <label>↔️ വീതി (Width):</label>
                <input type="range" id="boxWidth" min="5" max="40" value="15" oninput="updateBoxSize()">
                <label>↕️ ഉയരം (Height):</label>
                <input type="range" id="boxHeight" min="3" max="20" value="6" oninput="updateBoxSize()">
            </div>
            
            <button type="button" class="btn-record" id="startBtn" onclick="startRecording()">🎤 റെക്കോർഡിംഗ് തുടങ്ങുക</button>
            <button type="button" class="btn-stop" id="stopBtn" onclick="stopRecording()">🛑 റെക്കോർഡിംഗ് നിർത്തുക</button>
            <p class="status-text" id="recordStatus"></p>
            <audio id="audioPlayback" controls></audio>
            
            <button type="button" class="btn-blue" onclick="saveWordZone()">💾 ഈ വാക്ക് ലിങ്ക് ചെയ്യുക</button>
            <h4 id="zoneCount" style="color: #7f8c8d; text-align:center; margin: 5px 0;">(0 വാക്കുകൾ ചേർത്തു)</h4>
        </div>
        
        <button class="btn-green" style="font-size:16px; margin-top:15px; width: 100%; background: #2ecc71;" onclick="publishToZipWithMasterData()">🚀 സിപ്പ് (ZIP) ഫയൽ ഡൗൺലോഡ് ചെയ്യുക</button>
    </div>

    <script>
        let masterSchoolData = {};

        // 📥 പേജ് തുറക്കുമ്പോൾ തനിയെ GitHub-ൽ നിന്ന് പഴയ ലിസ്റ്റ് എടുക്കുന്ന ഫങ്ക്ഷൻ
        async function loadOldDataFromGitHub() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                let response = await fetch('data/master_list.json');
                if(response.ok) {
                    masterSchoolData = await response.json();
                    loadDropdowns();
                    document.getElementById('syncStatus').innerText = "✅ പഴയ ലിസ്റ്റുകൾ GitHub-ൽ നിന്ന് ലോഡ് ചെയ്തു!";
                } else {
                    document.getElementById('syncStatus').innerText = "ℹ️ ആദ്യത്തെ തവണയാണ്, ഫയലുകൾ ഒന്നും ലഭ്യമല്ല.";
                }
            } catch (e) {
                console.log("പഴയ ഫയലുകൾ ലഭ്യമല്ല", e);
                document.getElementById('syncStatus').innerText = "ℹ️ പഴയ ഡാറ്റ ലഭ്യമല്ല, പുതിയതായി തുടങ്ങാം.";
            }
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function loadDropdowns() {
            const madrasaSelect = document.getElementById('madrasaSelect');
            madrasaSelect.innerHTML = '';
            Object.keys(masterSchoolData).sort().forEach(madrasa => {
                let opt = document.createElement('option');
                opt.value = madrasa; opt.innerText = madrasa;
                madrasaSelect.appendChild(opt);
            });
            updateStudentDropdown();
        }

        function updateStudentDropdown() {
            const mSelect = document.getElementById('madrasaSelect').value;
            const sSelect = document.getElementById('finalStudentSelect');
            sSelect.innerHTML = '';
            if (mSelect && masterSchoolData[mSelect]) {
                masterSchoolData[mSelect].forEach(student => {
                    let opt = document.createElement('option');
                    opt.value = student; opt.innerText = student;
                    sSelect.appendChild(opt);
                });
            }
        }

        function addMadrasaData() {
            let name = document.getElementById('madrasaName').value.trim();
            if(!name) return alert("മദ്രസയുടെ പേര് നൽകുക!");
            if(masterSchoolData[name]) return alert("ഈ മദ്രസ നിലവിലുണ്ട്!");
            masterSchoolData[name] = [];
            document.getElementById('madrasaName').value = '';
            loadDropdowns();
            document.getElementById('madrasaSelect').value = name;
            updateStudentDropdown();
        }

        function addStudentData() {
            let madrasa = document.getElementById('madrasaSelect').value;
            let student = document.getElementById('studentName').value.trim();
            if(!madrasa) return alert("ആദ്യം മദ്രസ തിരഞ്ഞെടുക്കുക!");
            if(!student) return alert("കുട്ടിയുടെ പേര് എഴുതുക!");
            if(masterSchoolData[madrasa].includes(student)) return alert("ഈ കുട്ടി നിലവിലുണ്ട്!");
            masterSchoolData[madrasa].push(student);
            document.getElementById('studentName').value = '';
            updateStudentDropdown();
            document.getElementById('finalStudentSelect').value = student;
        }

        // --- 📖 റെക്കോർഡിംഗ് & മാപ്പിംഗ് ലോജിക് ---
        let currentZones = [];
        let selectedImageFile = null;
        let audioBlobs = []; 
        let mediaRecorder;
        let audioChunks = [];
        let pctLeft = 0, pctTop = 0;

        const imageUploader = document.getElementById('imageUploader');
        const bookImg = document.getElementById('bookImg');
        const selectionBox = document.getElementById('selectionBox');
        const imgContainer = document.getElementById('imageContainer');

        imageUploader.addEventListener('change', function(e) {
            selectedImageFile = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                bookImg.onload = function() {
                    document.getElementById('mappingSection').style.display = 'block';
                    selectionBox.style.display = 'none';
                    currentZones = []; audioBlobs = [];
                    document.getElementById('zoneCount').innerText = "(0 വാക്കുകൾ ചേർത്തു)";
                }
                bookImg.src = event.target.result;
            }
            reader.readAsDataURL(selectedImageFile);
        });

        function selectWordLocation(event) {
            const rect = imgContainer.getBoundingClientRect();
            let clickX = event.clientX - rect.left;
            let clickY = event.clientY - rect.top;
            let bWidthPct = parseFloat(document.getElementById('boxWidth').value);
            let bHeightPct = parseFloat(document.getElementById('boxHeight').value);
            pctLeft = ((clickX / rect.width) * 100) - (bWidthPct / 2);
            pctTop = ((clickY / rect.height) * 100) - (bHeightPct / 2);
            drawSelectionBox();
        }

        function drawSelectionBox() {
            let bWidthPct = document.getElementById('boxWidth').value;
            let bHeightPct = document.getElementById('boxHeight').value;
            selectionBox.style.left = pctLeft + '%'; selectionBox.style.top = pctTop + '%';
            selectionBox.style.width = bWidthPct + '%'; selectionBox.style.height = bHeightPct + '%';
            selectionBox.style.display = 'block';
        }

        function updateBoxSize() { if (selectionBox.style.display === 'block') drawSelectionBox(); }

        function startRecording() {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.start(); audioChunks = [];
                mediaRecorder.addEventListener("dataavailable", event => audioChunks.push(event.data));
                mediaRecorder.addEventListener("stop", () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    audioBlobs.push(audioBlob); 
                    document.getElementById('audioPlayback').src = URL.createObjectURL(audioBlob);
                    document.getElementById('audioPlayback').style.display = 'block';
                });
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                document.getElementById('recordStatus').innerText = "🔴 റെക്കോർഡ് ചെയ്യുന്നു...";
            }).catch(() => alert("മൈക്ക് ഓൺ ചെയ്യുക!"));
        }

        function stopRecording() {
            mediaRecorder.stop();
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('stopBtn').style.none;
            document.getElementById('recordStatus').innerText = "✅ റെക്കോർഡിംഗ് കഴിഞ്ഞു.";
        }

        function saveWordZone() {
            let bWidthPct = parseFloat(document.getElementById('boxWidth').value);
            let bHeightPct = parseFloat(document.getElementById('boxHeight').value);
            if (selectionBox.style.display === 'none') return alert("ചിത്രത്തിൽ തൊടുക!");
            if (audioBlobs.length === 0 || audioBlobs.length <= currentZones.length) return alert("ഓഡിയോ റെക്കോർഡ് ചെയ്യുക!");

            currentZones.push({
                coords: { left: pctLeft, top: pctTop, width: bWidthPct, height: bHeightPct },
                audioIndex: audioBlobs.length - 1, clicked: false
            });

            document.getElementById('zoneCount').innerText = `(${currentZones.length} വാക്കുകൾ ചേർത്തു)`;
            document.getElementById('audioPlayback').style.display = 'none';
            document.getElementById('recordStatus').innerText = "";
            selectionBox.style.display = 'none';
            alert("വാക്ക് ചേർത്തു!");
        }

        // 🚀 പഴയ കുട്ടികളുടെ ബാക്കപ്പും പുതിയ കുട്ടിയുടെ വിവരങ്ങളും ഒന്നിച്ച് സിപ്പ് ആക്കുന്ന ഫങ്ക്ഷൻ
        async function publishToZipWithMasterData() {
            let madrasa = document.getElementById('madrasaSelect').value;
            let student = document.getElementById('finalStudentSelect').value;
            
            if(!madrasa || !student) return alert("ദയവായി മദ്രസയും കുട്ടിയും തിരഞ്ഞെടുക്കുക!");
            if(!selectedImageFile || currentZones.length === 0) return alert("ചിത്രവും വാക്കുകളും ചേർക്കുക!");
            
            const loadText = document.getElementById('loadText');
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex';
            loadText.innerText = "⏳ പഴയ ഫയലുകൾ സുരക്ഷിതമായി ശേഖരിക്കുന്നു...";
            
            const zip = new JSZip();
            const pageId = Date.now().toString();
            const dataFolder = zip.folder("data");

            // 🔄 തന്ത്രപ്രധാനമായ നീക്കം: നിലവിൽ ഗിറ്റ്ഹബ്ബിലുള്ള പഴയ കുട്ടികളുടെ ചിത്രങ്ങളും ഓഡിയോകളും ഇന്റർനെറ്റ് വഴി പുതിയ സിപ്പിലേക്ക് മാറ്റുന്നു
            for (const m of Object.keys(masterSchoolData)) {
                for (const s of masterSchoolData[m]) {
                    // പുതിയ കുട്ടി ഒഴികെ ബാക്കി എല്ലാവരുടെയും പഴയ ജെയ്സൺ ഫയൽ ഡൗൺലോഡ് ചെയ്ത് എടുക്കുന്നു
                    if (m === madrasa && s === student) continue;
                    try {
                        let oldRes = await fetch(`data/${m}/${s}/data_book.json`);
                        if(oldRes.ok) {
                            let oldBook = await oldRes.json();
                            const oldFolder = dataFolder.folder(m).folder(s);
                            oldFolder.file("data_book.json", JSON.stringify(oldBook, null, 2));

                            // പഴയ ഇമേജ് ബാക്കപ്പ് ചെയ്യുന്നു
                            let imgRes = await fetch(oldBook.image);
                            if(imgRes.ok) oldFolder.file(oldBook.image.split('/').pop(), await imgRes.blob());

                            // പഴയ ഓരോ ഓഡിയോകളും ബാക്കപ്പ് ചെയ്യുന്നു
                            for (const zone of oldBook.zones) {
                                let audRes = await fetch(zone.audioSrc);
                                if(audRes.ok) oldFolder.file(zone.audioSrc.split('/').pop(), await audRes.blob());
                            }
                        }
                    } catch(e) { console.log(`പഴയ ഡാറ്റ ബാക്കപ്പ് ചെയ്യുന്നതിൽ പരാജയപ്പെട്ടു: ${m} -> ${s}`, e); }
                }
            }
            
            loadText.innerText = "📦 പുതിയ ഡാറ്റകൾ സിപ്പിലേക്ക് ചേർക്കുന്നു...";
            
            // 2. മാസ്റ്റർ ലിസ്റ്റ് ചേർക്കുന്നു
            dataFolder.file("master_list.json", JSON.stringify(masterSchoolData, null, 2));
            
            // പുതിയ കുട്ടിയുടെ ഫോൾഡർ
            const studentFolder = dataFolder.folder(madrasa).folder(student);
            
            // 3. പുതിയ ഇമേജ് ഫയൽ ചേർക്കുന്നു
            const imgExtension = selectedImageFile.name.split('.').pop();
            const zipImgName = `image_${pageId}.${imgExtension}`;
            studentFolder.file(zipImgName, selectedImageFile);
            
            // 4. പുതിയ ഓഡിയോ ഫയലുകൾ ചേർക്കുന്നു
            let updatedZones = [];
            for(let i=0; i<currentZones.length; i++) {
                let blobIndex = currentZones[i].audioIndex;
                let audioBlob = audioBlobs[blobIndex];
                const zipAudioName = `audio_${pageId}_${i}.mp3`;
                
                studentFolder.file(zipAudioName, audioBlob);
                
                updatedZones.push({
                    coords: currentZones[i].coords,
                    audioSrc: `data/${madrasa}/${student}/${zipAudioName}`,
                    clicked: false
                });
            }
            
            // 5. പുതിയ പാഠത്തിന്റെ JSON ഫയൽ
            const pageData = {
                id: pageId,
                madrasa: madrasa,
                student: student,
                image: `data/${madrasa}/${student}/${zipImgName}`,
                zones: updatedZones
            };
            studentFolder.file(`data_book.json`, JSON.stringify(pageData, null, 2));
            
            // 6. ഡൗൺലോഡ് ചെയ്യിക്കുന്നു
            zip.generateAsync({type:"blob"}).then(function(content) {
                const element = document.createElement("a");
                element.href = URL.createObjectURL(content);
                element.download = `data.zip`;
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
                
                overlay.style.display = 'none';
                alert("🎉 പഴയതും പുതിയതുമായ എല്ലാ ഡാറ്റയും അടങ്ങിയ 'data.zip' റെഡിയായിട്ടുണ്ട്!");
                window.location.reload();
            });
        }

        // പേജ് ലോഡ് ചെയ്യുമ്പോൾ തന്നെ ലോഡ് ചെയ്യുക
        loadOldDataFromGitHub();
    </script>
</body>
</html>
