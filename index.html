<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>സൗണ്ട് ബുക്ക് - മൊബൈൽ & ലാപ്ടോപ്പ് അഡ്മിൻ പാനൽ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background: #eef2f3; text-align: center; margin: 0; }
        .admin-box { background: white; max-width: 600px; margin: 0 auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* ചിത്രം കാണിക്കുന്ന ഭാഗം */
        .image-container { position: relative; display: inline-block; margin-top: 15px; border: 2px solid #34495e; max-width: 100%; overflow: hidden; }
        .image-container img { display: block; width: 100%; height: auto; max-width: 500px; }
        
        /* സെലക്ട് ചെയ്യുന്ന ബോക്സ് */
        .selection-box { position: absolute; border: 2px dashed #e74c3c; background: rgba(231, 76, 60, 0.3); display: none; pointer-events: none; }
        
        /* സൈസ് മാറ്റാനുള്ള കൺട്രോളുകൾ */
        .controls { background: #f9f9f9; padding: 15px; border-radius: 6px; margin-top: 15px; border: 1px solid #ddd; text-align: left; }
        .controls label { font-weight: bold; display: block; margin-top: 5px; }
        .controls input[type="range"] { width: 100%; margin-bottom: 10px; }

        button { color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; margin: 5px; font-weight: bold; font-size: 14px; }
        .btn-blue { background: #3498db; width: 100%; margin-top: 10px; }
        .btn-record { background: #e74c3c; }
        .btn-stop { background: #2c3e50; display: none; }
        .btn-publish { background: #2ecc71; width: 100%; margin-top: 20px; font-size: 16px; }
        
        .status-text { font-weight: bold; color: #e74c3c; margin: 10px 0; }
        #audioPlayback { margin-top: 10px; display: none; width: 100%; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>👨‍🏫 സൗണ്ട് ബുക്ക് അഡ്മിൻ പാനൽ</h2>
        <p>പുസ്തകത്തിന്റെ പേജ് ചിത്രം തിരഞ്ഞെടുക്കുക:</p>
        <input type="file" id="imageUploader" accept="image/*"><br><br>
        
        <div id="mappingSection" style="display:none;">
            <p style="color: #2c3e50; font-weight: bold;">📱 ചിത്രത്തിലെ വാക്കിന് മുകളിൽ ജസ്റ്റ് ഒന്ന് തൊടുക (Tap ചെയ്യുക):</p>
            
            <div class="image-container" id="imageContainer" onclick="selectWordLocation(event)">
                <img id="bookImg" src="" alt="Book Page">
                <div class="selection-box" id="selectionBox"></div>
            </div>
            
            <div class="controls">
                <label>↔️ ബോക്സിന്റെ വീതി (Width):</label>
                <input type="range" id="boxWidth" min="20" max="200" value="80" oninput="updateBoxSize()">
                
                <label>↕️ ബോക്സിന്റെ ഉയരം (Height):</label>
                <input type="range" id="boxHeight" min="15" max="100" value="35" oninput="updateBoxSize()">
            </div>
            
            <p><b>ഘട്ടം 2:</b> ആ വാക്ക് റെക്കോർഡ് ചെയ്യുക:</p>
            <div>
                <button type="button" class="btn-record" id="startBtn" onclick="startRecording()">🎤 റെക്കോർഡിംഗ് തുടങ്ങുക</button>
                <button type="button" class="btn-stop" id="stopBtn" onclick="stopRecording()">🛑 റെക്കോർഡിംഗ് നിർത്തുക</button>
            </div>
            <p class="status-text" id="recordStatus"></p>
            <audio id="audioPlayback" controls></audio>
            
            <button type="button" class="btn-blue" onclick="saveWordZone()">💾 ഈ വാക്ക് ലിങ്ക് ചെയ്ത് സേവ് ചെയ്യുക</button>
            <h3 id="zoneCount" style="color: #7f8c8d;">(0 വാക്കുകൾ ചേർത്തു)</h3>
        </div>
        
        <button class="btn-publish" onclick="publishToStudentPage()">ഈ പേജ് കുട്ടികൾക്കായി പബ്ലിഷ് ചെയ്യുക 🚀</button>
    </div>

    <script>
        let currentZones = [];
        let base64Img = "";
        let latestAudioBase64 = null;
        let mediaRecorder;
        let audioChunks = [];
        
        // സെലക്ഷൻ അളവുകൾ
        let selectedLeft = 0;
        let selectedTop = 0;

        const imageUploader = document.getElementById('imageUploader');
        const bookImg = document.getElementById('bookImg');
        const selectionBox = document.getElementById('selectionBox');
        const imgContainer = document.getElementById('imageContainer');

        // 1. ചിത്രം ലോഡ് ചെയ്യുമ്പോൾ
        imageUploader.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                bookImg.onload = function() {
                    document.getElementById('mappingSection').style.display = 'block';
                    selectionBox.style.display = 'none'; // പഴയ ബോക്സ് മാറ്റുക
                    currentZones = [];
                    document.getElementById('zoneCount').innerText = "(0 വാക്കുകൾ ചേർത്തു)";
                }
                bookImg.src = event.target.result;
                base64Img = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        // 2. ചിത്രത്തിൽ തൊടുമ്പോൾ ബോക്സ് അവിടെ കൊണ്ട് വെക്കുക (Mobile Friendly Click)
        function selectWordLocation(event) {
            const rect = imgContainer.getBoundingClientRect();
            
            // ക്ലിക്ക് ചെയ്ത സ്ഥലം കണ്ടുപിടിക്കുന്നു
            let clickX = event.clientX - rect.left;
            let clickY = event.clientY - rect.top;
            
            let bWidth = parseInt(document.getElementById('boxWidth').value);
            let bHeight = parseInt(document.getElementById('boxHeight').value);
            
            // ബോക്സ് ക്ലിക്ക് ചെയ്തതിന്റെ കൃത്യം നടുക്ക് വരാൻ
            selectedLeft = clickX - (bWidth / 2);
            selectedTop = clickY - (bHeight / 2);
            
            // ബോക്സ് ചിത്രത്തിന് പുറത്തേക്ക് പോകാതിരിക്കാൻ
            if(selectedLeft < 0) selectedLeft = 0;
            if(selectedTop < 0) selectedTop = 0;

            drawSelectionBox(selectedLeft, selectedTop, bWidth, bHeight);
        }

        // ബോക്സ് സ്ക്രീനിൽ കാണിക്കാൻ
        function drawSelectionBox(left, top, width, height) {
            selectionBox.style.left = left + 'px';
            selectionBox.style.top = top + 'px';
            selectionBox.style.width = width + 'px';
            selectionBox.style.height = height + 'px';
            selectionBox.style.display = 'block';
        }

        // സ്ലൈഡർ മാറ്റുമ്പോൾ ബോക്സിന്റെ വലിപ്പം തത്സമയം മാറ്റാൻ
        function updateBoxSize() {
            if (selectionBox.style.display === 'block') {
                let bWidth = parseInt(document.getElementById('boxWidth').value);
                let bHeight = parseInt(document.getElementById('boxHeight').value);
                drawSelectionBox(selectedLeft, selectedTop, bWidth, bHeight);
            }
        }

        // 3. വോയ്‌സ് റെക്കോർഡിംഗ് (മൊബൈലിലും വർക്ക് ചെയ്യും)
        function startRecording() {
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.start();
                    audioChunks = [];

                    mediaRecorder.addEventListener("dataavailable", event => {
                        audioChunks.push(event.data);
                    });

                    mediaRecorder.addEventListener("stop", () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = function() {
                            latestAudioBase64 = reader.result;
                            document.getElementById('audioPlayback').src = URL.createObjectURL(audioBlob);
                            document.getElementById('audioPlayback').style.display = 'block';
                        }
                    });

                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('stopBtn').style.display = 'inline-block';
                    document.getElementById('recordStatus').innerText = "🔴 റെക്കോർഡ് ചെയ്യുന്നു...";
                }).catch(err => {
                    alert("മൈക്ക് ഓൺ ചെയ്യാൻ അനുവാദം നൽകുക!");
                });
        }

        function stopRecording() {
            mediaRecorder.stop();
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('recordStatus').innerText = "✅ റെക്കോർഡിംഗ് കഴിഞ്ഞു.";
        }

        // 4. വാക്ക് സേവ് ചെയ്യുക
        function saveWordZone() {
            let bWidth = parseInt(document.getElementById('boxWidth').value);
            let bHeight = parseInt(document.getElementById('boxHeight').value);

            if (selectionBox.style.display === 'none') {
                return alert("ദയവായി ചിത്രത്തിൽ വാക്ക് ഉള്ള ഭാഗത്ത് ആദ്യം ഒന്ന് തൊടുക.");
            }
            if (!latestAudioBase64) {
                return alert("ദയവായി ഓഡിയോ റെക്കോർഡ് ചെയ്യുക.");
            }

            // കോർഡിനേറ്റുകളും ഓഡിയോയും അറേയിലേക്ക് മാറ്റുന്നു
            currentZones.push({
                coords: { left: selectedLeft, top: selectedTop, width: bWidth, height: bHeight },
                audioSrc: latestAudioBase64,
                clicked: false
            });

            document.getElementById('zoneCount').innerText = `(${currentZones.length} വാക്കുകൾ ചേർത്തു)`;
            
            // റീസെറ്റ് ഫോം
            document.getElementById('audioPlayback').style.style.display = 'none';
            document.getElementById('recordStatus').innerText = "";
            selectionBox.style.display = 'none';
            latestAudioBase64 = null;
            alert("വാക്ക് വിജയകരമായി ചേർത്തു! അടുത്ത വാക്ക് സെലക്ട് ചെയ്യാം.");
        }

        // 5. പബ്ലിഷ് ചെയ്യുക
        function publishToStudentPage() {
            if(!base64Img || currentZones.length === 0) return alert("വിവരങ്ങൾ അപൂർണ്ണമാണ്!");
            
            let localPages = JSON.parse(localStorage.getItem('soundBookPages')) || [];
            let newPage = { id: Date.now(), image: base64Img, zones: currentZones, completed: false };
            localPages.unshift(newPage); 
            
            localStorage.setItem('soundBookPages', JSON.stringify(localPages));
            alert("🎉 ഈ പേജ് കുട്ടികൾക്കായി പബ്ലിഷ് ചെയ്തു!");
            window.location.reload();
        }
    </script>
</body>
</html>
