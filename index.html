<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ഡെയിലി റിവിഷൻ ബുക്ക്</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a252f; color: white; padding: 10px; margin: 0; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: #2c3e50; padding: 15px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        h2 { margin-top: 5px; color: #ecf0f1; font-size: 20px; }
        .student-info { background: #34495e; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 15px; border-left: 5px solid #2ecc71; text-align: left; }
        .search-box { background: #34495e; padding: 12px; border-radius: 6px; margin-bottom: 15px; text-align: left; }
        label { font-size: 13px; color: #bdc3c7; display: block; margin-bottom: 4px; }
        input[type="text"] { width: 100%; padding: 10px; border: none; border-radius: 4px; background: #fff; color: #333; font-size: 14px; margin-bottom: 10px; }
        button { background: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 14px; }
        .image-wrapper { position: relative; width: 100%; border: 3px solid #7f8c8d; background: #000; margin-top: 10px; border-radius: 4px; overflow: hidden; display: none; }
        .image-wrapper img { width: 100%; display: block; height: auto; }
        .word-touch-zone { position: absolute; border: 2px dashed rgba(46, 204, 113, 0.4); background: rgba(46, 204, 113, 0.15); border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .word-touch-zone:active { background: rgba(231, 76, 60, 0.5); border-color: #e74c3c; }
        .no-data { color: #e74c3c; font-weight: bold; margin-top: 20px; font-size: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>📚 ഡെയിലി റിവിഷൻ ബുക്ക് 🔊</h2>
        
        <div class="search-box">
            <label>മദ്രസയുടെ പേര് (English):</label>
            <input type="text" id="fetchMadrasa" placeholder="ഉദാ: Busthan">
            <label>കുട്ടിയുടെ പേര് (English):</label>
            <input type="text" id="fetchStudent" placeholder="ഉദാ: Zain">
            <button onclick="loadStudentBook()">📖 പാഠം കാണുക</button>
        </div>

        <div class="student-info" id="infoBar" style="display:none;">
            👤 <b>വിദ്യാർത്ഥി:</b> <span id="lblStudent" style="color:#2ecc71;"></span><br>
            🏫 <b>മദ്രസ:</b> <span id="lblMadrasa"></span>
        </div>

        <p id="statusMsg" class="no-data"></p>

        <div class="image-wrapper" id="bookWrapper">
            <img id="pageImage" src="" alt="Book Page">
            <div id="zonesContainer"></div>
        </div>
    </div>

    <script>
        let currentAudio = null;

        async function loadStudentBook() {
            let madrasa = document.getElementById('fetchMadrasa').value.trim();
            let student = document.getElementById('fetchStudent').value.trim();
            
            if(!madrasa || !student) {
                alert("ദയവായി മദ്രസയുടെ പേരും കുട്ടിയുടെ പേരും ടൈപ്പ് ചെയ്യുക!");
                return;
            }

            let statusMsg = document.getElementById('statusMsg');
            let bookWrapper = document.getElementById('bookWrapper');
            let infoBar = document.getElementById('infoBar');
            let zonesContainer = document.getElementById('zonesContainer');
            
            statusMsg.innerText = "⏳ വിവരങ്ങൾ ശേഖരിക്കുന്നു...";
            bookWrapper.style.display = 'none';
            infoBar.style.display = 'none';
            zonesContainer.innerHTML = '';

            // 📂 ഗിറ്റ്ഹബിൽ നിങ്ങൾ അപ്‌ലോഡ് ചെയ്ത data ഫോൾഡറിൽ നിന്നും തനിയെ വിവരങ്ങൾ കണ്ടെത്തുന്നു
            // നിങ്ങളുടെ സിസ്റ്റം ഓഫ്‌ലൈൻ ആയതുകൊണ്ട് തന്നെ നമുക്ക് ഇവിടെ പേജിന്റെ കൃത്യമായ ID അറിയാൻ പ്രയാസമാണ്.
            // അതിനാൽ അഡ്മിൻ പാനൽ നിർമ്മിക്കുന്ന ഡാറ്റാ ഫയൽ എപ്പോഴും 'data_book.json' എന്ന ലളിതമായ പേരിൽ സേവ് ചെയ്യാൻ ഞാൻ അഡ്മിൻ കോഡ് മാറ്റിയിട്ടുണ്ട്.
            
            let jsonUrl = `data/${madrasa}/${student}/data_book.json`;

            try {
                let response = await fetch(jsonUrl);
                if(!response.ok) throw new Error("ഫയൽ കണ്ടെത്താനായില്ല");
                
                let pageData = await response.json();
                
                // വിവരങ്ങൾ സ്ക്രീനിൽ കാണിക്കുന്നു
                document.getElementById('lblStudent').innerText = pageData.student;
                document.getElementById('lblMadrasa').innerText = pageData.madrasa;
                infoBar.style.display = 'block';
                
                // ചിത്രം സെറ്റ് ചെയ്യുന്നു
                document.getElementById('pageImage').src = pageData.image;
                bookWrapper.style.display = 'block';
                statusMsg.innerText = "";

                // വാക്കുകളുടെ ടച്ച് സോണുകൾ ഉണ്ടാക്കുന്നു
                pageData.zones.forEach(zone => {
                    let box = document.createElement('div');
                    box.className = 'word-touch-zone';
                    box.style.left = zone.coords.left + '%';
                    box.style.top = zone.coords.top + '%';
                    box.style.width = zone.coords.width + '%';
                    box.style.height = zone.coords.height + '%';
                    
                    // ക്ലിക്ക് ചെയ്യുമ്പോൾ ഓഡിയോ പ്ലേ ചെയ്യാനുള്ള ഫങ്ക്ഷൻ
                    box.onclick = function() {
                        if(currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
                        currentAudio = new Audio(zone.audioSrc);
                        currentAudio.play().catch(e => console.log("ഓഡിയോ പ്ലേ ചെയ്യാൻ കഴിഞ്ഞില്ല:", e));
                    };
                    
                    zonesContainer.appendChild(box);
                });

            } catch (error) {
                statusMsg.innerText = "❌ ഈ കുട്ടിയുടെ പേരിൽ പാഠഭാഗങ്ങൾ ഒന്നും കണ്ടെത്തിയില്ല! (പേര് സ്പെല്ലിംഗ് കൃത്യമാണോ എന്ന് പരിശോധിക്കുക അല്ലെങ്കിൽ ഡാറ്റ ഫയൽ GitHub-ൽ അപ്‌ലോഡ് ചെയ്തിട്ടുണ്ടെന്ന് ഉറപ്പുവരുത്തുക).";
                console.error(error);
            }
        }
    </script>
</body>
</html>
